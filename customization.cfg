# sm64ex-custom config — MODULAR FORMAT
# Resource lists are space-separated filenames from sm64pc.info.
# The Python builder (builder/sm64ex-builder.py) generates this file
# automatically after parsing the HTML indexes.

# External config file path (overrides this file if exists)
_EXT_CONFIG_PATH=~/.config/sm64ex-custom/config
_EXT_CACHE_PATH=~/.cache/sm64ex-custom

# Set to 1 to use download cache
_useCache=1
_cleanCache=

# ---- Build options (make flags) ----
_bettercamera=
_debug=
_nodrawingdistance=
_texture_fix=
_external_data=
_discordrpc=
_windows_build=
_windows_console=
_textsaves=
_target_web=

# ---- Patches (space-separated filenames from sm64pc.info/downloads/patches/) ----
# Examples: 60fps_ex.patch tight_controls.patch 3d_coin_v2_nightly.patch
#           captain_toad_stars.patch leave_game.patch Added-exit-button.patch
#           nonstop_mode_always_enabled.patch increase_delay_on_star_select.patch
#           time_trials.2.3.patch exit_course_50_coin_fix.patch
#           anti_gravity_v5.patch demo_title_screen_v6.patch ... (any .patch file)
_patches=""

# ---- HD Models (space-separated filenames from sm64pc.info/downloads/model_pack/) ----
# Examples: hd_bowser.zip hd_koopa_the_quick.zip hd_peach_v2.zip
#           ATM64.7z Smoothio64.7z ... (any model file)
_hd_models=""

# ---- Mario model (single filename from sm64pc.info/downloads/model_pack/) ----
# Use "default" to skip. Common choices:
#   hd_mario_v2.zip  luigi.zip  hat_kid_v2.1.zip  bow_kid_v2.1.zip
#   mawio.zip  odyssey_mario.zip  old_school_hd_mario.zip  beta_mario.zip
_mario_model_file="default"

# ---- Texture pack (single filename OR git-based name) ----
# Direct download (from sm64pc.info/downloads/texture_pack/):
#   mollymutt.zip  hypatia.zip  owo.zip  beta_hud.zip  redrawn.zip
#   realistic.zip  render96_hd.zip  cleaner.zip  p3st.zip  etc.
#
# Git-based (uses internal _GIT_TEXTURE_MAP):
#   sm64_redrawn  resrgan_16x  resrgan_n64  p3st  minecraft
#   jappawakka_admentus_hd  cleaner
_texture_pack="default"

# us, eu, jp
_region=us

# default, 64, 32
_target_bits=default

# GL, GL_LEGACY, D3D11, D3D12
_render_api=GL

# Set to 1 to install .desktop shortcut and icon
_install_desktop=1

# Path to ROM file (baserom.<region>.z64)
_rom_path=
